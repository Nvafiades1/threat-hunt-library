<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Threat-Hunt Library – MITRE Matrix</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {font-family: system-ui, sans-serif; margin: 0; background: #111; color:#eee;}
    .matrix {display: grid; overflow-x:auto; padding:1rem;
             grid-auto-rows: minmax(2.5rem,auto);}
    .tactic    {background:#222; font-weight:600; text-align:center; padding:.5rem; border:1px solid #333;}
    .technique {background:#1a1a1a; margin:.5rem; padding:.25rem .5rem; border-radius:4px;
                border:1px solid #444; font-size:.85rem;}
    a {color:#8cf; text-decoration:none;}
    a:hover {text-decoration:underline;}
  </style>
</head>
<body>
<h1 style="text-align:center;margin:1rem 0">Threat-Hunt Library<br>MITRE ATT&CK Matrix</h1>
<div id="matrix" class="matrix"></div>


<script>
(async () => {
  /* ---------- configuration ---------- */
  const owner  = "Nvafiades1";
  const repo   = "threat-hunt-library";
  const branch = "main";           // whichever branch holds the files
  const tactics = [
    "Reconnaissance","Resource Development","Initial Access","Execution",
    "Persistence","Privilege Escalation","Defense Evasion","Credential Access",
    "Discovery","Lateral Movement","Collection","Command And Control",
    "Exfiltration","Impact"
  ];
  const api    = path => `https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${branch}`;
  const raw    = path => `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${path}`;

  /* ---------- build empty matrix ---------- */
  const matrix = document.getElementById("matrix");
  matrix.style.gridTemplateColumns = `repeat(${tactics.length}, minmax(12rem,1fr))`;
  tactics.forEach(t => {
    const head = document.createElement("div");
    head.className = "tactic";
    head.textContent = t;
    matrix.appendChild(head);
  });

  /* ---------- load mapping { "T1595": "Reconnaissance", … } ---------- */
  let map = {};
  try {
    map = await (await fetch(raw("mitre_ttp_mapping.json"))).json();
  } catch(e) {
    console.error("Could not load mitre_ttp_mapping.json:", e);
  }

  /* ---------- fetch technique folders ---------- */
  const res = await fetch(api("techniques"));
  if (!res.ok) {
    console.error("Cannot read techniques/ folder:", await res.text());
    return;
  }
  const techs = await res.json();

  /* ---------- place each technique ---------- */
  const colCache = {}; // tactic -> <div> to append into
  const findCol = tact => {
    if (colCache[tact]) return colCache[tact];
    // create a hidden anchor div to keep grid alignment: skip first header row
    const idx = tactics.indexOf(tact);
    const anchor = document.createElement("div");
    anchor.style.gridColumnStart = idx + 1; // grid columns are 1-based
    matrix.appendChild(anchor);
    colCache[tact] = anchor;
    return anchor;
  };

  techs.forEach(item => {
    if (item.type !== "dir" && item.type !== "file") return;
    const name = item.name.replace(/_/g, " ");        // T1595 Search Engines
    const id   = (name.match(/T\d{4}/) || ["UNK"])[0];
    const tactic = map[id] || "Unmapped";
    const cell = document.createElement("div");
    cell.className = "technique";
    const link = document.createElement("a");
    link.href = item.html_url;
    link.textContent = name;
    cell.appendChild(link);
    findCol(tactic).appendChild(cell);
  });
})();
</script>
</body>
</html>
