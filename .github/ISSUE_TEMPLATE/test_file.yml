name: "TRR Issue"
description: "A template for creating TRR issues with fillable fields."
title: "TRR{{ values.id }}-{{ values.template_title }}"
labels: [ "TRR" ]
assignees: []

body:
  # -- BASIC METADATA FIELDS --
  - type: input
    id: template_title
    attributes:
      label: "Short Title or Name"
      placeholder: "DNS-Spoofing"
      description: "Enter the short name (e.g., DNS-Spoofing)."
    validations:
      required: true

  - type: input
    id: id
    attributes:
      label: "TRR ID"
      placeholder: "0001"
      description: "Enter the numeric part of the TRR ID (e.g., 0001). The 'TRR' prefix is added automatically."
    validations:
      required: true

  - type: input
    id: external_ids
    attributes:
      label: "External IDs"
      placeholder: "[T1207], [AZT000.0]"
      description: "List of external ID references."
    validations:
      required: false

  - type: input
    id: tactics
    attributes:
      label: "Tactics"
      placeholder: "Initial Access, Privilege Escalation, etc."
      description: "Comma-separated list of tactics."
    validations:
      required: false

  - type: input
    id: platforms
    attributes:
      label: "Platforms"
      placeholder: "Windows, Linux, macOS, etc."
      description: "Comma-separated list of affected platforms."
    validations:
      required: false

  - type: input
    id: contributors
    attributes:
      label: "Contributors"
      placeholder: "John Smith, Jane Doe"
      description: "Comma-separated list of contributors."
    validations:
      required: false

  # (Other fields can be added below as needed)
