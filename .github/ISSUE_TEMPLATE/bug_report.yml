version: 2
name: "Bug Report"
description: "Use this template for bug reports"
title: "Bug: "
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: "Thanks for reporting a bug!"

  - type: input
    id: description
    attributes:
      label: "Bug description"
      description: "A clear and concise description of the issue."
    validations:
      required: true
