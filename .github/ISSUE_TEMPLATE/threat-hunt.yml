name: "Threat Hunt Submission"
description: "Submit a new threat hunt for review"
title: "[THREAT HUNT] <Short Title>"
labels: ["threat-hunt"]
body:
  - type: markdown
    attributes:
      value: |
        ## Threat Hunt Submission
        Please fill in the following details. Make sure to include the MITRE technique in the format:
        
        **Technique: T####**
        
        This is required for automated processing.
  - type: input
    id: technique
    attributes:
      label: "MITRE Technique ID"
      description: "Enter the technique ID (e.g., T1003)"
      placeholder: "T1003"
  - type: textarea
    id: hunt_details
    attributes:
      label: "Threat Hunt YAML Details"
      description: "Fill in the details below. Edit or remove placeholders as needed."
      placeholder: |
        Technique: T1003
        
        id: TH-YYYY-NNN
        created: "YYYY-MM-DDTHH:MM:SSZ"
        modified: "YYYY-MM-DDTHH:MM:SSZ"
        
        labels:
          - example-label
          - additional-label
        
        Hunt:
          hunt_platform: "SIEM / Splunk / ELK etc."
          hunter_notes: >-
            Enter your detailed hunter notes here, including methodology, observations, and any anomalies.
          query: |-
            // Add your threat hunt query here
          query_fidelity: "High / Medium / Low"
          severity: "Critical / High / Medium / Low"
          confidence: "High / Medium / Low or percentage"
          status: "In Progress / Completed / False Positive"
          threat_actor: "If applicable"
          impacted_systems: "List affected systems"
          detection_window: "Start Date - End Date"
          observed_indicators: "List IOCs or key observations"
          mitigation: "Mitigation steps taken or recommended"
          recommendations: "Further recommendations for investigation or remediation"
          visibility_gaps: "Any gaps in detection capabilities"
