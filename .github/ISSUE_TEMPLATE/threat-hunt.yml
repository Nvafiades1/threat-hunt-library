name: "Threat Hunt Submission"
description: "Submit a new threat hunt for review"
title: "[THREAT HUNT] <Short Title>"
labels:
  - threat-hunt
body:
  - type: markdown
    attributes:
      value: |
        ## Threat Hunt Submission
        Please fill in the details below. **Be sure to include the MITRE technique in the format:**

        **Technique: T####**

        This is required for automated processing.
  - type: input
    id: technique
    attributes:
      label: "MITRE Technique ID"
      description: "Enter the technique ID in the format T#### (e.g., T1003). **Note:** This must exactly match the syntax 'Technique: T###' in your issue description for automated processing."
      placeholder: "T1003"
  - type: input
    id: hunt_id
    attributes:
      label: "Threat Hunt ID"
      description: "Enter a unique hunt identifier (e.g., TH-2025-001)"
      placeholder: "TH-2025-001"
  - type: input
    id: created
    attributes:
      label: "Created"
      description: "Date/time the hunt was initiated in ISO 8601 format (e.g., 2025-03-01T12:00:00Z)"
      placeholder: "2025-03-01T12:00:00Z"
  - type: input
    id: modified
    attributes:
      label: "Modified"
      description: "Date/time the hunt was last updated in ISO 8601 format (e.g., 2025-03-01T12:00:00Z)"
      placeholder: "2025-03-01T12:00:00Z"
  - type: textarea
    id: labels_list
    attributes:
      label: "Additional Labels"
      description: "Enter any additional labels (comma-separated) relevant to this hunt (e.g., malware, network, endpoint)"
      placeholder: "malware, endpoint"
  - type: input
    id: hunt_platform
    attributes:
      label: "Hunt Platform"
      description: "Specify the platform used (e.g., Splunk, ELK, SIEM tool)"
      placeholder: "Splunk"
  - type: textarea
    id: hunter_notes
    attributes:
      label: "Hunter Notes"
      description: "Enter detailed notes about your methodology, observations, and any anomalies."
      placeholder: "Enter your detailed hunter notes here..."
  - type: textarea
    id: query
    attributes:
      label: "Hunt Query"
      description: "Add your threat hunt query or search script here."
      placeholder: |
        // Add your threat hunt query here
  - type: input
    id: query_fidelity
    attributes:
      label: "Query Fidelity"
      description: "How reliable is this query? (e.g., High, Medium, Low)"
      placeholder: "High"
  - type: input
    id: severity
    attributes:
      label: "Severity"
      description: "Enter the severity level (e.g., Critical, High, Medium, Low)"
      placeholder: "High"
  - type: input
    id: confidence
    attributes:
      label: "Confidence"
      description: "Enter your confidence in the findings (e.g., High, Medium, Low or a percentage)"
      placeholder: "90%"
  - type: input
    id: status
    attributes:
      label: "Status"
      description: "Current status of the hunt (e.g., In Progress, Completed, False Positive)"
      placeholder: "Completed"
  - type: input
    id: threat_actor
    attributes:
      label: "Threat Actor"
      description: "Specify any known or suspected threat actor(s), if applicable"
      placeholder: "APT29"
  - type: input
    id: impacted_systems
    attributes:
      label: "Impacted Systems"
      description: "List or describe the systems impacted"
      placeholder: "Workstations, Servers, etc."
  - type: input
    id: detection_window
    attributes:
      label: "Detection Window"
      description: "Specify the time period during which the activity was detected (e.g., Start Date - End Date)"
      placeholder: "2025-02-25 to 2025-03-01"
  - type: textarea
    id: observed_indicators
    attributes:
      label: "Observed Indicators"
      description: "List any indicators of compromise (IOCs) or key observations"
      placeholder: "Indicator1, Indicator2, ..."
  - type: textarea
    id: visibility_gaps
    attributes:
      label: "Visibility Gaps"
      description: "Note any gaps in detection or monitoring that were observed"
      placeholder: "Enter any visibility gaps here..."
  - type: textarea
    id: supporting_evidence
    attributes:
      label: "Supporting Evidence"
      description: "Attach or provide links to any supporting evidence (e.g., images, screenshots, documents). You can drag-and-drop files into the comment box."
      placeholder: "Enter links or details here..."
