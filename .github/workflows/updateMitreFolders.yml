name: Update MITRE Folders

on:
  schedule:
    - cron: "0 0 * * 0"   # Weekly, Sunday 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-attack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install node-fetch@2

      - name: Sync techniques/ and mapping from MITRE STIX
        run: node .github/scripts/createMitreFolders.js

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add techniques/ mitre_ttp_mapping.json .mitre-attack-version
          if git diff --cached --quiet; then
            echo "No MITRE ATT&CK changes to sync."
            exit 0
          fi
          VERSION=$(cat .mitre-attack-version 2>/dev/null | tr -d '\n' || echo "unknown")
          git commit -m "Sync with MITRE ATT&CK Enterprise v${VERSION}"
          git push
