name: Update MITRE Folders
on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * 0"  # Weekly run; adjust as needed

jobs:
  generate-folders:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "16"

      - name: Install dependencies
        run: npm install node-fetch@2

      - name: Run MITRE folder creation script
        run: node .github/scripts/createMitreFolders.js

      - name: Debug PAT Token
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          echo "PAT token length: ${#PAT_TOKEN}"

      - name: Commit and Push Changes
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git config --global user.name "Nvafiades1"
          git config --global user.email "nvafiades@protonmail.com"
          echo "Before updating remote:"
          git remote -v
          # Update remote URL to use the PAT only (no trailing slash)
          git remote set-url origin "https://${PAT_TOKEN}@github.com/Nvafiades1/threat-hunt-library.git"
          echo "After updating remote:"
          git remote -v
          # Stage only changes in the techniques folder
          git add techniques/
          # Check if there are changes in the techniques folder
          if [ -n "$(git status --porcelain techniques/)" ]; then
            git commit -m "Update MITRE technique folders"
            git push origin main
          else
            echo "No changes to commit in techniques folder."
          fi
