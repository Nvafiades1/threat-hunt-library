name: "Save New Issue to Folder"

on:
  issues:
    types: [opened]

jobs:
  save_issue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create issue file
        run: |
          # Define folder name and create it if it doesn't exist
          FOLDER="issues"
          mkdir -p "$FOLDER"

          # Use the issue number for a unique filename
          FILE="$FOLDER/issue-${{ github.event.issue.number }}.md"

          # Create file content with issue title, body, and author info
          echo "# ${{ github.event.issue.title }}" > "$FILE"
          echo "" >> "$FILE"
          echo "${{ github.event.issue.body }}" >> "$FILE"
          echo "" >> "$FILE"
          echo "_Created by @${{ github.event.issue.user.login }}_" >> "$FILE"

      - name: Commit and push new issue file
        uses: EndBug/add-and-commit@v9
        with:
          author_name: github-actions
          author_email: github-actions@github.com
          message: "Add issue ${{ github.event.issue.number }}: ${{ github.event.issue.title }}"
          add: "issues/issue-${{ github.event.issue.number }}.md"
