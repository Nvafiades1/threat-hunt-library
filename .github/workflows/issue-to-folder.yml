name: "Save New Issue to Folder"

on:
  issues:
    types: [opened]

jobs:
  save_issue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create issue file
        run: |
          # Define folder name and create it if it doesn't exist
          FOLDER="issues"
          mkdir -p "$FOLDER"

          # Use the issue number for a unique filename
          FILE="$FOLDER/issue-${{ github.event.issue.number }}.md"

          # Create file content with issue title, body, and author info
          echo "# ${{ github.event.issue.title }}" > "$FILE"
          echo "" >> "$FILE"
          echo "${{ github.event.issue.body }}" >> "$FILE"
          echo "" >> "$FILE"
          echo "_Created by @${{ github.event.issue.user.login }}_" >> "$FILE"

      - name: Commit and Push Changes
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git config --global user.name "Nvafiades1"
          git config --global user.email "nvafiades@protonmail.com"
          echo "Before updating remote:"
          git remote -v
          # Update remote URL to use the PAT only (no trailing slash)
          git remote set-url origin "https://${PAT_TOKEN}@github.com/Nvafiades1/threat-hunt-library.git"
          echo "After updating remote:"
          git remote -v
          # Stage only changes in the techniques folder
          git add techniques/
          # Check if there are changes in the techniques folder
          if [ -n "$(git status --porcelain techniques/)" ]; then
            git commit -m "Update MITRE technique folders"
            git push origin main
          else
            echo "No changes to commit in techniques folder."
          fi
