name: "Save New Issue to Folder"

on:
  issues:
    types: [opened]

jobs:
  save_issue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create issue file
        run: |
          # Define folder name and create it if it doesn't exist
          FOLDER="test"
          mkdir -p "$FOLDER"

          # Use the issue number for a unique filename
          FILE="$FOLDER/issue-${{ github.event.issue.number }}.md"

          # Create file content with issue title, body, and author info
          echo "# ${{ github.event.issue.title }}" > "$FILE"
          echo "" >> "$FILE"
          echo "${{ github.event.issue.body }}" >> "$FILE"
          echo "" >> "$FILE"
          echo "_Created by @${{ github.event.issue.user.login }}_" >> "$FILE"

      - name: Commit and Push Changes
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          # Configure Git with your info
          git config --global user.name "Nvafiades1"
          git config --global user.email "nvafiades@protonmail.com"
          
          # Update remote URL to use the PAT
          git remote set-url origin "https://${PAT_TOKEN}@github.com/Nvafiades1/threat-hunt-library.git"
          
          # Stage changes in the 'test' folder
          git add test/
          
          # Attempt to commit changes. If there are no changes, this will fail, so we use "||" to handle that gracefully.
          git commit -m "Add issue ${{ github.event.issue.number }}: ${{ github.event.issue.title }}" || echo "No changes to commit in test folder."
          
          # Push changes to the main branch
          git push origin main
