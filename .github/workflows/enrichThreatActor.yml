name: Enrich Threat Actor

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  issues: write

jobs:
  enrich:
    if: github.event.issue.state == 'open'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install @octokit/rest node-fetch@2

      - name: Enrich issue with MITRE ATT&CK threat-actor data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/enrichThreatActor.js
