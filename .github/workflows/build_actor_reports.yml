name: Build Actor Reports

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'tools/build_actor_reports.py'
      - 'tools/threat_actors_hhs.json'
      - 'tools/threat_actors_state.json'
      - '.github/workflows/build_actor_reports.yml'

permissions:
  contents: write

concurrency:
  group: build-actor-reports
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build actor reports
        run: python tools/build_actor_reports.py

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/actors/
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "Auto-build actor reports [skip ci]"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && exit 0
            sleep 3
          done
          echo "Push failed after retries" >&2
          exit 1
