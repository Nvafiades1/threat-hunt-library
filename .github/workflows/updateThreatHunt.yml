name: Update Threat Hunt on Completion
on:
  issues:
    types: [edited, closed]

permissions:
  contents: write
  issues: read

jobs:
  update-technique:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm install @octokit/rest @octokit/graphql node-fetch@2

      - name: Run updateThreatHunt Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/updateThreatHunt.js
